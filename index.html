<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ffb340" />
    <meta name="description" content="Aatra AI - AI-powered conversations that understand you. Experience smart chatting with advanced AI technology." />
    <meta name="keywords" content="AI chat, conversational AI, messaging, Aatra" />
    
    <!-- PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Aatra AI" />
    <meta name="mobile-web-app-capable" content="yes" />
    
    <!-- Icons -->
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://aatra.ai" />
    <meta property="og:title" content="Aatra AI - AI-Powered Conversational Platform" />
    <meta property="og:description" content="Experience conversations that understand you. Connect with advanced AI technology." />
    <meta property="og:image" content="/icon-512.png" />
    <meta property="og:site_name" content="Aatra AI" />
    
    <!-- Twitter Card -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://aatra.ai" />
    <meta property="twitter:title" content="Aatra AI - AI-Powered Chat Platform" />
    <meta property="twitter:description" content="Experience conversations that understand you." />
    <meta property="twitter:image" content="/icon-512.png" />
    
    <title>Aatra AI - Powered by Google Gemini, 100% Free</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/service-worker.js').then(registration => {
          console.log('ServiceWorker registration successful:', registration.scope);
        }).catch(err => {
          console.log('ServiceWorker registration failed: ', err);
        });
      }
    </script>
  </body>
</html>
